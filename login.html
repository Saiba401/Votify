<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votify | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="login">
  <div class="navbar-wrap">
    <nav class="navbar container">
      <a class="brand" href="index.html">Votify <small>Simple Polls</small></a>
      <div class="nav-links" id="navbarLinks"></div>
    </nav>
  </div>

  <main class="container">
    <section class="page-title">
      <h1>Login</h1>
      <p>Sign in to create, edit, and manage your polls.</p>
    </section>

    <div class="grid cols-2">
      <form id="loginForm">
        <div id="loginNotice"></div>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button class="btn block" type="submit">Login</button>
      </form>

      <article class="card">
        <h2>New here?</h2>
        <p>Create your account to start building polls and collecting votes.</p>
        <div class="card-actions">
          <a class="btn secondary" href="register.html">Go to Register</a>
        </div>
        <p class="meta">Demo account: demo@votify.app / demo1234</p>
      </article>
    </div>
  </main>

  <footer class="container">Votify front-end prototype.</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
