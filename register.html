<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votify | Create Account</title>
  
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    :root {
      --bg-main: #0a0a0a;
      --bg-card: #141414;
      --bg-nav: rgba(10, 10, 10, 0.8);
      --border-color: #262626;
      --text-main: #f5f5f5;
      --text-muted: #737373;
      --brand-accent: #3ecf8e; 
      --brand-hover: #34b27b;
      --font-sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-sans);
      margin: 0;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* --- NAVBAR --- */
    .navbar-wrap {
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-nav);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      color: var(--text-main);
    }

    .brand i { color: var(--brand-accent); }

    /* --- REGISTER LAYOUT --- */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      background: radial-gradient(circle at 50% 100%, #11221a 0%, #0a0a0a 40%);
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 8px 0;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 0;
    }

    /* --- FORM STYLES --- */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-main);
    }

    input {
      background: #0a0a0a;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px 16px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: var(--brand-accent);
      box-shadow: 0 0 0 2px rgba(62, 207, 142, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--brand-accent);
      color: #000;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .btn:hover { background: var(--brand-hover); transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 20px;
      text-align: center;
      display: block;
      text-decoration: none;
    }

    .btn-secondary:hover { color: var(--text-main); }

    /* --- INFO SECTION --- */
    .info-box {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .info-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-item i {
      color: var(--brand-accent);
      flex-shrink: 0;
    }

    .info-item p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* --- FOOTER --- */
    .footer {
      border-top: 1px solid var(--border-color);
      padding: 40px 0;
      background: #050505;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--brand-accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--brand-accent);
    }
  </style>
</head>
<body data-page="register">

  <div class="navbar-wrap">
    <nav class="navbar container">
      <a class="brand" href="index.html">
        <i data-lucide="vote"></i>
        Votify
      </a>
      <div class="nav-group">
        <a href="login.html" class="btn-secondary" style="margin: 0;">Sign In</a>
      </div>
    </nav>
  </div>

  <main>
    <div class="auth-card">
      <div class="auth-header">
        <h1>Join Votify</h1>
        <p>Start creating real-time polls in seconds.</p>
      </div>

      <form id="registerForm">
        <div id="registerNotice"></div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="name@company.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Min. 6 characters" minlength="6" required />
          <div style="display: flex; gap: 4px; margin-top: 4px;">
            <div style="height: 3px; flex: 1; background: var(--border-color); border-radius: 2px;"></div>
            <div style="height: 3px; flex: 1; background: var(--border-color); border-radius: 2px;"></div>
            <div style="height: 3px; flex: 1; background: var(--border-color); border-radius: 2px;"></div>
          </div>
        </div>

        <button class="btn" type="submit">
          Create Account
          <i data-lucide="user-plus" size="18"></i>
        </button>
      </form>

      <div class="info-box">
        <div class="info-item">
          <i data-lucide="check-circle-2" size="18"></i>
          <p><strong>Instant Access.</strong> Redirected straight to your dashboard after signup.</p>
        </div>
        <div class="info-item">
          <i data-lucide="shield-check" size="18"></i>
          <p><strong>Secure by default.</strong> Your data is protected by Supabase Auth.</p>
        </div>
      </div>

      <a href="login.html" class="btn-secondary">Already have an account? Log in</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-bottom">
      <div style="color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 Votify. Build with Supabase.
      </div>
      <div class="status-indicator">
        <div class="dot"></div>
        Systems Operational
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
